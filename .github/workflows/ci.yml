name: CI

on:
  push:
    branches: [ master, stable ]
  pull_request:
    branches: [ master, stable ]

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ldap3 bcrypt parameterized pytest

      - name: Run unit tests
        working-directory: src
        env:
          PYTHONPATH: .
        run: pytest tests/ -q --tb=short

  frontend-tests:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-src/package-lock.json

      - name: Install dependencies
        working-directory: web-src
        run: npm ci

      - name: Run unit tests
        working-directory: web-src
        run: npm run test:unit-ci

  e2e-tests:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-src/package-lock.json

      - name: Install frontend dependencies
        working-directory: web-src
        run: npm ci

      - name: Install Playwright browser
        working-directory: web-src
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: web-src
        # Builds the frontend, then starts the backend with the isolated
        # e2e config (tests/e2e/server.sh creates its own venv) and runs
        # the Playwright suite against it.
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web-src/playwright-report/
          retention-days: 7
